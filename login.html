<!DOCTYPE html>
<html>
<head>
<title>CampusBite Faculty</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

.card{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
width:350px;
}

h1{
margin-bottom:10px;
}

input{
width:100%;
padding:12px;
margin-top:15px;
border-radius:6px;
border:1px solid #ccc;
}

button{
margin-top:20px;
padding:12px;
width:100%;
border:none;
background:#4facfe;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#2f8cff;
}

</style>
</head>

<body>

<div class="card">

<h1>CampusBite</h1>
<p>Faculty Menu Access</p>

<form method="POST">

<input type="email" name="email" placeholder="Enter faculty email" required>

<button type="submit">Send Menu</button>

</form>

</div>

</body>
</html>
